        /* --- VARIABLES & RESET --- */
        :root {
            --primary-dark: #0f172a;

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;

            border-bottom: 1px solid var(--border-light);

            flex-shrink: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            padding: 0 2rem;
            justify-content: space-between;
        }

        .logo {
            font-family: 'Poppins', sans-serif;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary-dark);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .logo span { color: var(--primary-blue); }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--primary-blue);
        }

            flex: 1;
            height: calc(100vh - 70px);
            position: relative;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 350px;
            background: var(--bg-white);
            border-right: 1px solid var(--border-light);
            display: flex;
            flex-direction: column;
            z-index: 500;
            box-shadow: var(--shadow-sm);
        }

        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border-light);
        }

       .search-container {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .search-input {
            width: 100%;
            padding: 12px 15px 12px 42px; /* left padding for icon */
            border: 1px solid var(--border-light);
            border-radius: 8px;
            background: #f8fafc;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 0 3px rgba(30, 58, 138, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 14px;
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            pointer-events: none;
        } 

        .sidebar {
            display: flex;
            flex-direction: column;
        }

        .building-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem;
        }

        .building-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 8px;
            cursor: pointer;
            transition: var(--transition);
            border: 1px solid transparent;
        }

        .building-item:hover {
            background-color: #f0f9ff;
            border-color: #bae6fd;
        }

        .building-item.active {
            background-color: var(--primary-blue);
            color: white;
            box-shadow: 0 4px 12px rgba(30, 58, 138, 0.2);
        }

        .building-item.active .building-icon {
            background: rgba(255,255,255,0.2);
            color: white;
        }
        
        .building-item.active small { color: rgba(255,255,255,0.8); }

        .building-icon {
            width: 40px; height: 40px;
            background: #f1f5f9;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 15px;
            color: var(--text-muted);
            font-size: 1.2rem;
            transition: var(--transition);
        }

        .building-info h4 {
            font-size: 0.95rem; font-weight: 600; margin-bottom: 2px;
        }

        .building-info small {
            font-size: 0.8rem; color: var(--text-muted);
        }

        .sidebar-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--border-light);
            background: var(--bg-white);

            border: none;
            border-radius: 8px;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-route:hover {
            background: #172554;
            transform: translateY(-2px);

            flex: 1;
            position: relative;
            background-color: #e5e7eb;
            overflow: hidden;

        #map {

            height: 100%;
            z-index: 1;
            background: #f0f0f0; /* Fallback color while image loads */

        .btn-locate {
            position: absolute;

            right: 30px;

            border-radius: 50%;

            justify-content: center;

        // --- GRAPH & ROUTING LOGIC ---
        
        // 1. Graph Structure (Adjacency List)
        let campusGraph = {};

        // Helper: Calculate Euclidean Distance for CRS.Simple
        function getDistance(coord1, coord2) {
            const dy = coord1[0] - coord2[0];
            const dx = coord1[1] - coord2[1];
            return Math.sqrt(dx * dx + dy * dy);
        }

        // 2.  Graph 
        // Note: In a real app, you would hardcode road connections here.
        function getCoords(id) {
            let building = locations.find(l => l.id === id);
            if (building) return building.coords;

            let road = roadNodes.find(r => r.id === id);
            if (road) return road.coords;

            return null;
        }

        function connect(a, b) {
            const coordA = getCoords(a);
            const coordB = getCoords(b);

            const dist = getDistance(coordA, coordB);

            campusGraph[a][b] = dist;
            campusGraph[b][a] = dist;
        }

            function drawRoadNetwork() {

                roadNodes.forEach(node => {
                    const neighbors = campusGraph[node.id];

                    for (let neighborId in neighbors) {

                        // Only draw road-to-road connections
                        if (typeof neighborId === "string" && neighborId.startsWith("R")) {

                            const from = getCoords(node.id);
                            const to = getCoords(neighborId);

                            L.polyline([from, to], {
                                color: '#9ca3af',   // light grey road
                                weight: 4,
                                opacity: 0.6
                            }).addTo(map);
                        }
                    }
                });
            }


        // 3. Dijkstra's Algorithm
        function findShortestPath(startId, endId) {
            let distances = {};
            let prev = {};

        let allNodes = [
            ...locations.map(l => l.id),
            ...roadNodes.map(r => r.id)
        ];

        let pq = new Set(allNodes);

            // Initialize
           allNodes.forEach(id => distances[id] = Infinity);
            distances[startId] = 0;

            while (pq.size > 0) {
                // Find node with min distance in PQ
                let minNode = null;
                for (let node of pq) {
                    if (minNode === null || distances[node] < distances[minNode]) {
                        minNode = node;
                    }
                }

                if (minNode === endId) break; // Reached destination
                if (distances[minNode] === Infinity) break; // No path

                pq.delete(minNode);

                // Update neighbors
                let neighbors = campusGraph[minNode];
                for (let neighborId in neighbors) {
                    let alt = distances[minNode] + neighbors[neighborId];
                    if (alt < distances[neighborId]) {
                        distances[neighborId] = alt;
                        prev[neighborId] = minNode;
                    }
                }
            }

            // Reconstruct Path
            let path = [];
            let u = endId;
            if (prev[u] || u === startId) {
                    while (u !== undefined) {
                        path.unshift(u);   // NO parseInt
                        u = prev[u];
                    }
            }
            return path;
        }

        function handleRoute() {
            const startId = parseInt(document.getElementById('startNode').value);
            const endId = parseInt(document.getElementById('endNode').value);

            if (!startId || !endId) {
                alert("Please select both a source and a destination.");
                return;
            }

            if (startId === endId) {
                alert("Source and Destination cannot be the same.");
                return;
            }

            // Remove old route layers
            if (currentRouteLine) map.removeLayer(currentRouteLine);
            if (currentGlowLine) map.removeLayer(currentGlowLine);

         // Reset markers
         locations.forEach(loc => {
    let markerIcon = iconBlue;

    else if (loc.category === "Administration") markerIcon = iconDarkBlue;

    markers[loc.id].setIcon(markerIcon);
});


            // 1. Calculate Path
            const pathIds = findShortestPath(startId, endId);
            
            if (pathIds.length < 2) {
                alert("No route found between these locations.");
                return;
            }

        
            // 3. Highlight Start & End Markers

            markers[startId].setZIndexOffset(1000); // Bring to front
            
            markers[endId].setIcon(iconEnd);
            markers[endId].setZIndexOffset(1000);

            // 4. Draw Polyline
                        
            const latlngs = pathIds.map(id => getCoords(id));

       // this show the distance btw source & destination
            let totalDistance = 0;

            for (let i = 0; i < latlngs.length - 1; i++) {
                totalDistance += getDistance(latlngs[i], latlngs[i + 1]);
            }

            // Convert pixel distance to meters (adjust scale)
            let meters = totalDistance * 0.30; 

            // ---- IMPROVEMENT 1: Smart Distance Format ----
            let distanceText = meters > 1000
                ? (meters / 1000).toFixed(2) + " km"
                : meters.toFixed(0) + " m";

            // ---- IMPROVEMENT 2: Better Time Format ----
            let walkingSpeed = 1; // meters per second
            let seconds = meters / walkingSpeed;

            let minutes = Math.floor(seconds / 60);
            let remainingSeconds = Math.floor(seconds % 60);

            // Update UI
            const routeInfo = document.getElementById('routeInfo');
            routeInfo.style.display = 'block';
            routeInfo.innerHTML = `
            <strong>Route Details</strong><br>
            Distance: ${distanceText}<br>
            Estimated Time: ${minutes} min ${remainingSeconds} sec walk`;



           
           // SIMPLE STRAIGHT ROUTE (TEST FIRST)

                currentGlowLine = L.polyline(latlngs, {

                    dashArray: '10, 10'
                }).addTo(map);

        }
